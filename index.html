<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌱 Harvest Tracker v3 - Alexa's Moestuin</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; color: #1a1a1a; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        .login-container { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #2d5016, #5a9e2d); }
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); width: 100%; max-width: 400px; }
        .login-card h1 { font-size: 24px; margin-bottom: 10px; color: #2d5016; }
        .login-card p { color: #666; margin-bottom: 30px; font-size: 14px; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; font-family: inherit; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #2d5016; box-shadow: 0 0 0 3px rgba(45, 80, 22, 0.1); }
        
        .btn { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: all 0.2s; font-size: 14px; }
        .btn-primary { background: #2d5016; color: white; width: 100%; }
        .btn-primary:hover { background: #1f3810; }
        .btn-small { padding: 8px 16px; font-size: 12px; width: auto; }
        .btn-danger { background: #e74c3c; color: white; }
        
        .header { background: linear-gradient(135deg, #2d5016, #5a9e2d); color: white; padding: 20px; margin-bottom: 30px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 24px; }
        .logout-btn { background: rgba(255,255,255,0.2); color: white; padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .logout-btn:hover { background: rgba(255,255,255,0.3); }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #ddd; flex-wrap: wrap; }
        .tab-btn { padding: 12px 20px; background: none; border: none; cursor: pointer; font-size: 14px; color: #666; border-bottom: 3px solid transparent; transition: all 0.3s; }
        .tab-btn.active { color: #2d5016; border-bottom-color: #2d5016; font-weight: 600; }
        
        .card { background: white; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: linear-gradient(135deg, #f0f8e8, #e8f4d4); padding: 15px; border-radius: 8px; border-left: 4px solid #2d5016; }
        .stat-label { font-size: 12px; color: #666; font-weight: 600; text-transform: uppercase; }
        .stat-value { font-size: 24px; font-weight: 700; color: #2d5016; margin-top: 5px; }
        
        .table-responsive { overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #f8f8f8; padding: 12px; text-align: left; font-weight: 600; border-bottom: 2px solid #ddd; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        tr:hover { background: #f9f9f9; }
        
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
        .photo-preview { width: 100%; max-width: 300px; border-radius: 8px; margin-top: 10px; border: 2px solid #ddd; }
        .hidden { display: none; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .empty-message { text-align: center; padding: 40px 20px; color: #999; font-size: 14px; }
        
        @media (max-width: 768px) {
            .header { flex-direction: column; gap: 15px; }
            .tabs { flex-direction: column; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="loginPage" class="login-container">
        <div class="login-card">
            <h1>🌱 Harvest Tracker</h1>
            <p>Alexa's Moestuin Oogst Logger v3</p>
            <div class="form-group">
                <label>Wachtwoord</label>
                <input type="password" id="adminPassword" onkeypress="if(event.key==='Enter') adminLogin()">
            </div>
            <button class="btn btn-primary" onclick="adminLogin()">🔐 Login</button>
            <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #ddd; text-align: center;">
                <button class="btn btn-primary" style="background: #5a9e2d;" onclick="viewPublic()">👁️ Public</button>
            </div>
        </div>
    </div>

    <div id="adminPage" class="hidden">
        <div class="container">
            <div class="header">
                <h1>🌱 Admin Dashboard</h1>
                <button class="logout-btn" onclick="adminLogout()">Logout</button>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('daily', event)">📝 Oogsten</button>
                <button class="tab-btn" onclick="switchTab('recepten', event)">📖 Recepten</button>
                <button class="tab-btn" onclick="switchTab('settings', event)">⚙️ Instellingen</button>
            </div>

            <div id="daily" class="tab-content active">
                <div class="card">
                    <h2 style="margin-bottom: 20px;">📝 Voeg Oogst Toe</h2>
                    <div class="form-grid">
                        <div class="form-group"><label>Datum</label><input type="date" id="formDate"></div>
                        <div class="form-group"><label>Plant</label><select id="formPlant"><option value="tomaat_kerstomaat">🍅 Kerstomaat</option><option value="courgette">🟢 Courgette</option><option value="rode_kool">🔴 Rode Kool</option></select></div>
                        <div class="form-group"><label>Gewicht (kg)</label><input type="number" id="formWeight" step="0.01"></div>
                        <div class="form-group"><label>Verwerking</label><select id="formProcessing"></select></div>
                    </div>
                    <div class="form-group">
                        <label>📸 Foto</label>
                        <input type="file" id="formPhoto" accept="image/*">
                        <img id="photoPreview" class="photo-preview hidden">
                    </div>
                    <div class="form-group">
                        <label>Gekoppeld Recept</label>
                        <select id="formRecipe"><option value="">Geen</option></select>
                    </div>
                    <button class="btn btn-primary" onclick="addHarvest()">➕ Voeg Toe</button>
                </div>

                <div class="card">
                    <h2 style="margin-bottom: 15px;">📋 Oogsten</h2>
                    <div class="table-responsive"><table id="harvestTable"><thead><tr><th>Foto</th><th>Datum</th><th>Plant</th><th>Gewicht</th><th>Verwerking</th><th>Actie</th></tr></thead><tbody id="harvestBody"></tbody></table></div>
                </div>
            </div>

            <div id="recepten" class="tab-content">
                <div class="card">
                    <h2 style="margin-bottom: 20px;">📖 Voeg Recept Toe</h2>
                    <div class="form-grid">
                        <div class="form-group"><label>Naam</label><input type="text" id="recepeName"></div>
                        <div class="form-group"><label>Verwerking</label><select id="recepeProcessing"></select></div>
                    </div>
                    <div class="form-group"><label>Ingrediënten (komma's)</label><textarea id="recepeIngredients" rows="4"></textarea></div>
                    <div class="form-group"><label>Stappen (enter per stap)</label><textarea id="recepeSteps" rows="4"></textarea></div>
                    <button class="btn btn-primary" onclick="addRecipe()">📖 Voeg Toe</button>
                </div>
                <div id="recipesList"></div>
            </div>

            <div id="settings" class="tab-content">
                <div class="card">
                    <h2 style="margin-bottom: 20px;">⚙️ Verwerkingen</h2>
                    <div class="form-group">
                        <label>Nieuwe Verwerking</label>
                        <input type="text" id="newProcessing">
                    </div>
                    <button class="btn btn-primary btn-small" onclick="addProcessing()">➕ Voeg Toe</button>
                    <div id="processingList" style="margin-top: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px;"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="publicPage" class="hidden">
        <div class="container">
            <div class="header">
                <h1>🌱 Alexa's Moestuin Oogsten</h1>
                <button class="logout-btn" onclick="backToLogin()">← Terug</button>
            </div>
            <div class="card">
                <div class="stats-grid" id="publicStats"></div>
            </div>
            <div id="publicHarvests"></div>
        </div>
    </div>

    <script>
        const CORRECT_PASSWORD = CryptoJS.SHA256("Alexavdd32").toString();
        const PLANT_LABELS = { tomaat_kerstomaat: '🍅 Kerstomaat', courgette: '🟢 Courgette', rode_kool: '🔴 Rode Kool' };
        
        let harvests = JSON.parse(localStorage.getItem('harvests') || '[]');
        let recipes = JSON.parse(localStorage.getItem('recipes') || '[]');
        let customProcessings = JSON.parse(localStorage.getItem('customProcessings') || ['Vers eten', 'Weck/Inmaak', 'Dehydreren', 'Invriezer', 'Fermenteren']);
        let isAdmin = false;

        document.getElementById('formDate').valueAsDate = new Date();
        updateSelects();

        function updateSelects() {
            const s1 = document.getElementById('formProcessing');
            const s2 = document.getElementById('recepeProcessing');
            s1.innerHTML = customProcessings.map(p => `<option>${p}</option>`).join('');
            s2.innerHTML = customProcessings.map(p => `<option>${p}</option>`).join('');
            updateRecipeSelect();
        }

        function updateRecipeSelect() {
            document.getElementById('formRecipe').innerHTML = '<option value="">Geen</option>' + recipes.map((r, i) => `<option value="${i}">${r.name}</option>`).join('');
        }

        document.getElementById('formPhoto').addEventListener('change', function(e) {
            if (e.target.files[0]) {
                const reader = new FileReader();
                reader.onload = evt => {
                    document.getElementById('photoPreview').src = evt.target.result;
                    document.getElementById('photoPreview').classList.remove('hidden');
                };
                reader.readAsDataURL(e.target.files[0]);
            }
        });

        function adminLogin() {
            if (CryptoJS.SHA256(document.getElementById('adminPassword').value).toString() === CORRECT_PASSWORD) {
                isAdmin = true;
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('adminPage').classList.remove('hidden');
                updateHarvests();
                updateRecipesList();
                updateProcessingList();
            } else alert('❌ Fout wachtwoord!');
        }

        function adminLogout() {
            isAdmin = false;
            document.getElementById('adminPage').classList.add('hidden');
            document.getElementById('loginPage').classList.remove('hidden');
        }

        function viewPublic() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('publicPage').classList.remove('hidden');
            updatePublic();
        }

        function backToLogin() {
            document.getElementById('publicPage').classList.add('hidden');
            document.getElementById('loginPage').classList.remove('hidden');
        }

        function switchTab(tab, e) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            e.target.classList.add('active');
        }

        function addHarvest() {
            const harvest = {
                id: Date.now(),
                date: document.getElementById('formDate').value,
                plant: document.getElementById('formPlant').value,
                weight: parseFloat(document.getElementById('formWeight').value),
                processing: document.getElementById('formProcessing').value,
                recipe: document.getElementById('formRecipe').value || null,
                photo: document.getElementById('photoPreview').src || null
            };
            if (!harvest.weight) { alert('Voer gewicht in!'); return; }
            harvests.push(harvest);
            localStorage.setItem('harvests', JSON.stringify(harvests));
            document.getElementById('formWeight').value = '';
            document.getElementById('formPhoto').value = '';
            document.getElementById('photoPreview').classList.add('hidden');
            document.getElementById('formDate').valueAsDate = new Date();
            updateHarvests();
            alert('✅ Toegevoegd!');
        }

        function deleteHarvest(id) {
            if (confirm('Zeker?')) {
                harvests = harvests.filter(h => h.id !== id);
                localStorage.setItem('harvests', JSON.stringify(harvests));
                updateHarvests();
            }
        }

        function updateHarvests() {
            const total = harvests.reduce((s, h) => s + h.weight, 0);
            document.getElementById('harvestBody').innerHTML = [...harvests].reverse().map(h => `
                <tr>
                    <td>${h.photo ? '<img src="' + h.photo + '" style="width:50px; height:50px; border-radius:4px; object-fit:cover;">' : '—'}</td>
                    <td>${h.date}</td>
                    <td>${PLANT_LABELS[h.plant]}</td>
                    <td>${h.weight.toFixed(2)} kg</td>
                    <td>${h.processing}</td>
                    <td><button class="btn btn-danger btn-small" onclick="deleteHarvest(${h.id})">X</button></td>
                </tr>
            `).join('');
        }

        function addRecipe() {
            const r = { name: document.getElementById('recepeName').value, processing: document.getElementById('recepeProcessing').value, ingredients: document.getElementById('recepeIngredients').value.split(',').map(i => i.trim()), steps: document.getElementById('recepeSteps').value.split('\n').filter(s => s.trim()) };
            if (!r.name || !r.ingredients[0]) { alert('Vul alles in!'); return; }
            recipes.push(r);
            localStorage.setItem('recipes', JSON.stringify(recipes));
            document.getElementById('recepeName').value = '';
            document.getElementById('recepeIngredients').value = '';
            document.getElementById('recepeSteps').value = '';
            updateRecipesList();
            updateRecipeSelect();
            alert('✅ Recept toegevoegd!');
        }

        function deleteRecipe(i) {
            if (confirm('Verwijderen?')) {
                recipes.splice(i, 1);
                localStorage.setItem('recipes', JSON.stringify(recipes));
                updateRecipesList();
                updateRecipeSelect();
            }
        }

        function updateRecipesList() {
            document.getElementById('recipesList').innerHTML = recipes.length === 0 ? '<p class="empty-message">Nog geen recepten</p>' : recipes.map((r, i) => `
                <div class="card">
                    <h3>${r.name}</h3>
                    <p>${r.processing}</p>
                    <h4 style="margin-top: 15px;">Ingrediënten:</h4>
                    <ul style="margin-left: 20px;">${r.ingredients.map(ing => `<li>${ing}</li>`).join('')}</ul>
                    <h4 style="margin-top: 15px;">Stappen:</h4>
                    <ol style="margin-left: 20px;">${r.steps.map(s => `<li>${s}</li>`).join('')}</ol>
                    <button class="btn btn-danger btn-small" onclick="deleteRecipe(${i})" style="margin-top: 15px;">Verwijder</button>
                </div>
            `).join('');
        }

        function addProcessing() {
            const name = document.getElementById('newProcessing').value.trim();
            if (!name || customProcessings.includes(name)) { alert('Ongeldig!'); return; }
            customProcessings.push(name);
            localStorage.setItem('customProcessings', JSON.stringify(customProcessings));
            document.getElementById('newProcessing').value = '';
            updateSelects();
            updateProcessingList();
            alert('✅ Toegevoegd!');
        }

        function deleteProcessing(name) {
            customProcessings = customProcessings.filter(p => p !== name);
            localStorage.setItem('customProcessings', JSON.stringify(customProcessings));
            updateSelects();
            updateProcessingList();
        }

        function updateProcessingList() {
            document.getElementById('processingList').innerHTML = customProcessings.map(p => `
                <div style="background: #f0f8e8; padding: 10px; border-radius: 6px; display: flex; justify-content: space-between;">
                    <span>${p}</span>
                    <button class="btn btn-danger btn-small" onclick="deleteProcessing('${p}')">X</button>
                </div>
            `).join('');
        }

        function updatePublic() {
            const total = harvests.reduce((s, h) => s + h.weight, 0);
            document.getElementById('publicStats').innerHTML = `
                <div class="stat-card"><div class="stat-label">Totale Oogst</div><div class="stat-value">${total.toFixed(1)} kg</div></div>
                <div class="stat-card"><div class="stat-label">Aantal Oogsten</div><div class="stat-value">${harvests.length}</div></div>
            `;
            document.getElementById('publicHarvests').innerHTML = [...harvests].reverse().map(h => `
                <div class="card">
                    <div style="display: flex; gap: 20px;">
                        ${h.photo ? `<img src="${h.photo}" style="width: 200px; height: 200px; border-radius: 8px; object-fit: cover;">` : ''}
                        <div>
                            <h3>${PLANT_LABELS[h.plant]}</h3>
                            <p><strong>Datum:</strong> ${h.date}</p>
                            <p><strong>Gewicht:</strong> ${h.weight.toFixed(2)} kg</p>
                            <p><strong>Verwerking:</strong> ${h.processing}</p>
                            ${h.recipe !== null && recipes[h.recipe] ? `<p><strong>Recept:</strong> ${recipes[h.recipe].name}</p>` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        updateSelects();
    </script>
</body>
</html>
